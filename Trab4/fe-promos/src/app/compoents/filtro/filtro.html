<aside class="w-full lg:w-64 bg-white rounded-2xl border border-gray-100 p-5 shadow-sm space-y-6 h-fit sticky top-20">
  
  <div>
    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Ofertas Especiais</h3>
    <button 
      (click)="alternarDestaques()"
      [ngClass]="apenasDestaques ? 'bg-orange-50 border-orange-200 text-orange-700 shadow-sm shadow-orange-50' : 'bg-gray-50 border-gray-100 text-gray-700 hover:bg-gray-100'"
      class="w-full flex items-center justify-between p-3 rounded-xl border text-sm font-semibold transition-all group"
    >
      <div class="flex items-center gap-2">
        <span class="text-base group-hover:scale-110 transition-transform">🔥</span>
        <span>Hot Deals (Destaques)</span>
      </div>
      @if (apenasDestaques) {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4 text-orange-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
      }
    </button>
  </div>

  <div class="border-t border-gray-50 pt-5">
    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Categorias</h3>
    
    <ul class="space-y-1">
      <li>
        <button 
          (click)="selecionarCategoria(null)"
          [ngClass]="categoriaSelecionadaId === null ? 'bg-gray-900 text-white font-semibold' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
          class="w-full text-left px-3 py-2 rounded-lg text-sm transition-all"
        >
          Todas as Categorias
        </button>
      </li>

      @for (cat of categorias; track cat.id) {
        <li>
          <button 
            (click)="selecionarCategoria(cat.id)"
            [ngClass]="categoriaSelecionadaId === cat.id ? 'bg-orange-500 text-white font-semibold shadow-sm' : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'"
            class="w-full text-left px-3 py-2 rounded-lg text-sm transition-all flex items-center justify-between"
          >
            <span>{{ cat.nome | titlecase }}</span>
          </button>
        </li>
      }
    </ul>
  </div>

</aside>
