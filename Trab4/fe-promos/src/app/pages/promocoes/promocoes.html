<div class="flex flex-col lg:flex-row gap-6">
  
  <app-filtro (filtroAlterado)="aplicarFiltros($event)"></app-filtro>

  <div class="flex-1 space-y-6">
    <div class="border-b border-gray-200 pb-4">
      <h2 class="text-2xl font-black text-gray-900 tracking-tight">Promoções Ativas</h2>
      <p class="text-xs text-gray-500 mt-0.5">Vote nas melhores ofertas e ajude a comunidade a encontrar os melhores Hot Deals!</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
      @for (item of promocoesFiltradas; track item.id) {
        <app-promocao 
          [promo]="item" 
          (votoAlterado)="processarVoto($event)">
        </app-promocao>
      } @empty {
        <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-dashed border-gray-200">
          <p class="text-sm text-gray-400 font-medium">Nenhuma promoção corresponde aos filtros selecionados.</p>
        </div>
      }
    </div>
  </div>

</div>
