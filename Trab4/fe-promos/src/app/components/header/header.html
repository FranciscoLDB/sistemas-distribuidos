<header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between gap-4">
    
    <div class="flex items-center gap-2 cursor-pointer">
      <img src="icon.png" alt="Logo" class="w-8 h-8 rounded">
      <span class="text-xl font-bold bg-linear-to-r from-red-500 to-orange-500 bg-clip-text text-transparent">
        FePromos
      </span>
    </div>

    <div class="flex-1 max-w-xl mx-4">
      <div class="relative">
        <input 
          type="text" 
          [(ngModel)]="termoPesquisa"
          (keyup.enter)="buscar()"
          placeholder="Buscar promoções ou categorias..." 
          class="w-full bg-gray-100 text-sm text-gray-700 pl-4 pr-10 py-2 rounded-full border border-transparent focus:outline-none focus:border-orange-400 focus:bg-white transition-all"
        >
        <button (click)="buscar()" class="absolute right-3 top-2.5 text-gray-400 hover:text-orange-500">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.604 10.604Z" />
          </svg>
        </button>
      </div>
    </div>

    <div class="relative">
      
      @if (usuarioLogado) {
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-semibold text-gray-700">{{ usuarioLogado.nome }}</p>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium" 
                  [ngClass]="usuarioLogado.tipo === 'LOJA' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'">
              {{ usuarioLogado.tipo }}
            </span>
          </div>
          <button (click)="logout()" class="text-xs text-red-500 hover:underline font-medium border border-gray-200 px-3 py-1.5 rounded-lg hover:bg-red-50">
            Sair
          </button>
        </div>
      } 
      
      @else {
        <button 
          (click)="alternarCaixaLogin()" 
          class="flex items-center gap-2 bg-linear-to-r from-orange-500 to-red-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:opacity-90 shadow-sm transition-all"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
          Conta
        </button>
      }

      @if (exibirCaixaLogin && !usuarioLogado) {
        <div class="absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-xl border border-gray-100 p-4 animate-in fade-in slide-in-from-top-2 duration-200">
          <h3 class="text-base font-bold text-gray-800 mb-3">Entrar no Sistema</h3>
          
          <form (ngSubmit)="efetuarLoginRapido()" class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Usuário / E-mail</label>
              <input 
                type="text" 
                name="username"
                [(ngModel)]="loginData.username"
                placeholder="Ex: LojaDasPromos" 
                class="w-full text-sm border border-gray-200 rounded-md p-2 focus:outline-none focus:border-orange-500"
                required
              >
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-500 mb-1">Senha</label>
              <input 
                type="password" 
                name="password"
                [(ngModel)]="loginData.password"
                placeholder="••••••••" 
                class="w-full text-sm border border-gray-200 rounded-md p-2 focus:outline-none focus:border-orange-500"
                required
              >
            </div>
            
            <button 
              type="submit" 
              class="w-full bg-gray-900 text-white text-sm py-2 rounded-md font-medium hover:bg-gray-800 transition-colors mt-2"
            >
              Entrar
            </button>
          </form>
          
          <div class="border-t border-gray-100 mt-3 pt-2 text-center">
            <span class="text-xs text-gray-400">Dica: digite "loja" no usuário para logar como perfil de Loja.</span>
          </div>
        </div>
      }

    </div>
  </div>
</header>
