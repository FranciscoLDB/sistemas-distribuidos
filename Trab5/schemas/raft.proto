syntax = "proto3";

package trab5rpc;

service RaftService {
  
  rpc request_vote (VoteRequest) returns (VoteReply) {}

  rpc append_entries (AppendEntriesRequest) returns (AppendEntriesReply) {}
}

message VoteRequest {
  int32 candidate_term = 1;
  string candidate_id = 2;
  int32 last_log_index = 3;
  int32 last_log_term = 4;
}

message VoteReply {
  int32 term = 1;
  bool success = 2;
}

message AppendEntriesRequest {
  int32 leader_term = 1;
  string leader_id = 2;
  int32 prev_log_index = 3;
  int32 prev_log_term = 4;
  repeated LogEntry entries = 5;
  int32 leader_commit = 6;
}

message AppendEntriesReply {
  int32 term = 1;
  bool success = 2;
}

message LogEntry {
  int32 term = 1;
  string command = 2;
}

